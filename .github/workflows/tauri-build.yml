name: "Build & Release System"

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Build Tauri Desktop binaries (Windows/macOS/Linux)
  # ──────────────────────────────────────────────────
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            label: "windows-x64"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            label: "windows-arm"
          - platform: "macos-latest"
            target: "universal-apple-darwin"
            label: "macos-universal"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            label: "macos-intel"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            label: "macos-arm"
          - platform: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
            label: "linux-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install Linux dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static assets
        run: npm run build:tauri
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_IP2LOCATION_KEY: ${{ secrets.NEXT_PUBLIC_IP2LOCATION_KEY }}
          NEXT_PUBLIC_CRIMINALIP_KEY: ${{ secrets.NEXT_PUBLIC_CRIMINALIP_KEY }}
          NEXT_PUBLIC_IPINFO_TOKEN: ${{ secrets.NEXT_PUBLIC_IPINFO_TOKEN }}
          NEXT_PUBLIC_SCAMALYTICS_CLIENT: ${{ secrets.NEXT_PUBLIC_SCAMALYTICS_CLIENT }}
          NEXT_PUBLIC_SCAMALYTICS_KEY: ${{ secrets.NEXT_PUBLIC_SCAMALYTICS_KEY }}

      - name: Prepare signing key and password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python prepare_key.py

      - name: Run key verification diagnostics
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python verify_key.py

      - name: Verify signing key works
        shell: bash
        run: |
          echo "Test content" > mock.txt
          npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" mock.txt
          rm mock.txt

      - name: Fix bundle script permissions (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true
          chmod +x src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true

      - name: Build and upload desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          tagName: v__VERSION__
          releaseName: "QC Manager v__VERSION__"
          releaseBody: |
            QC Manager release updates.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # ──────────────────────────────────────────────────
  # Job 2: Build Android APK
  # ──────────────────────────────────────────────────
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static files
        run: IS_CAPACITOR_BUILD=true npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK file
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/QC-Manager-Android.apk
          elif [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/QC-Manager-Android.apk
          else
            echo "Error: Release APK not found!"
            exit 1
          fi

      - name: Get package version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: android/app/build/outputs/apk/release/QC-Manager-Android.apk
          tag_name: v${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────
  # Job 3: Build iOS Project (Validation check only)
  # ──────────────────────────────────────────────────
  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static files
        run: IS_CAPACITOR_BUILD=true npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Check Apple Developer Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE_P12 }}" ] && [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && [ -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" ] && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Secrets found. App will be signed and packaged into IPA."
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "Secrets missing. App will run compiler validation build only."
          fi

      - name: Install Apple Certificate and Provisioning Profile
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          # Create temporary keychain
          security create-keychain -p "runner" ios-build.keychain
          security default-keychain -s ios-build.keychain
          security unlock-keychain -p "runner" ios-build.keychain
          security set-keychain-settings -t 3600 -u ios-build.keychain

          # Decode and import P12 cert
          echo "${{ secrets.APPLE_CERTIFICATE_P12 }}" | base64 --decode -o ios_dist.p12
          security import ios_dist.p12 -k ios-build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "runner" ios-build.keychain

          # Setup provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/ad_hoc.mobileprovision

      - name: Create ExportOptions.plist
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          cat <<EOF > ios/App/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>compileBitcode</key>
              <false/>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.qc.manager</key>
                  <string>ad_hoc</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build Xcode Archive (Signed)
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphoneos -configuration Release archive -archivePath ios/App/App.xcarchive

      - name: Export Archive to IPA (Signed)
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          xcodebuild -exportArchive -archivePath ios/App/App.xcarchive -exportOptionsPlist ios/App/ExportOptions.plist -exportPath ios/App/build
          mv ios/App/build/App.ipa ios/App/build/QC-Manager-iOS.ipa

      - name: Build Xcode Validation (Unsigned)
        if: steps.check_secrets.outputs.has_secrets == 'false'
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" clean build

      - name: Get package version
        if: steps.check_secrets.outputs.has_secrets == 'true'
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload iOS IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.check_secrets.outputs.has_secrets == 'true' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: ios/App/build/QC-Manager-iOS.ipa
          tag_name: v${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────
  # Job 4: Combine releases, zip OTA assets, calculate SHA256, publish to Supabase
  # ──────────────────────────────────────────────────
  combine-release-json:
    needs: [build-tauri, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static files
        run: IS_CAPACITOR_BUILD=true npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Run release manifests, checksums, and OTA publisher script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-release-manifests.js
