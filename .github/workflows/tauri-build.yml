name: "Build & Release Tauri Desktop App"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Build binaries for each platform in parallel
  # ──────────────────────────────────────────────────
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            label: 'windows-x64'
          - platform: 'windows-latest'
            target: 'i686-pc-windows-msvc'
            label: 'windows-x86'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            label: 'macos-intel'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            label: 'macos-arm'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static assets
        run: npm run build:tauri
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Prepare signing key and password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python prepare_key.py

      - name: Run key verification diagnostics
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python verify_key.py

      - name: Verify signing key and password work
        shell: bash
        run: |
          echo "=== ENV VARIABLES ==="
          env | grep TAURI || true
          echo "Test content" > mock.txt
          npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" mock.txt
          rm mock.txt

      - name: Fix bundle script permissions (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true
          chmod +x src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true

      - name: Build and upload desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          tagName: v__VERSION__
          releaseName: "QC App v__VERSION__"
          releaseBody: |
            ### QC App v__VERSION__ 🚀

            **v3.1.0** introduces a comprehensive Team Daily Leave Records report, customized Excel/PDF exports with date/supervisor filenames, custom loading skeletons, back button fixes, and codebase optimizations.

            #### 🛠 What's New in v3.1.0:

            - **Team Daily Leave Records Dashboard** — Supervisors can view/filter daily records of their team members (admins see all records) with customized Name & Codename column grids.
            - **Excel & PDF Exports** — Added spreadsheet and report exports with automated filename convention: `[Date]-[Supervisor Name]'s Team Leave record`.
            - **Custom Skeleton loaders** — Tailored skeleton structures that prevent layout shifts and match exact daily table headers.
            - **Direct Back Navigation** — Clicking back exits directly to the main leave tracker form.
            - **Codebase optimizations** — Resolved conditional hook rules of hooks issues and ESLint prefer-const violations.

            #### 📦 Installation Instructions:
            - **Windows (64-bit)**: Download the `x86_64` `.exe` or `.msi` installer.
            - **Windows (32-bit)**: Download the `i686` `.exe` or `.msi` installer.
            - **macOS (Intel)**: Download the `x86_64` `.dmg` and drag to Applications.
            - **macOS (Apple Silicon)**: Download the `aarch64` `.dmg` (M1/M2/M3/M4/M5) and drag to Applications.

            *Developed by Kamrul Islam, IT Officer, B&F Corporate.*
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
