name: "Build & Release System"

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Build Tauri Desktop binaries (Windows/macOS/Linux)
  # ──────────────────────────────────────────────────
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            label: "windows-x64"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            label: "windows-arm"
          - platform: "macos-latest"
            target: "universal-apple-darwin"
            label: "macos-universal"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            label: "macos-intel"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            label: "macos-arm"
          - platform: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
            label: "linux-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install Linux dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static assets
        run: npm run build:tauri
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_IP2LOCATION_KEY: ${{ secrets.NEXT_PUBLIC_IP2LOCATION_KEY }}
          NEXT_PUBLIC_CRIMINALIP_KEY: ${{ secrets.NEXT_PUBLIC_CRIMINALIP_KEY }}
          NEXT_PUBLIC_IPINFO_TOKEN: ${{ secrets.NEXT_PUBLIC_IPINFO_TOKEN }}
          NEXT_PUBLIC_SCAMALYTICS_CLIENT: ${{ secrets.NEXT_PUBLIC_SCAMALYTICS_CLIENT }}
          NEXT_PUBLIC_SCAMALYTICS_KEY: ${{ secrets.NEXT_PUBLIC_SCAMALYTICS_KEY }}

      - name: Prepare signing key and password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python prepare_key.py

      - name: Run key verification diagnostics
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python verify_key.py

      - name: Verify signing key works
        shell: bash
        run: |
          echo "Test content" > mock.txt
          npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" mock.txt
          rm mock.txt

      - name: Fix bundle script permissions (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true
          chmod +x src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/bundle_dmg.sh 2>/dev/null || true

      - name: Build desktop binaries
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Upload compiled bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.tar.gz
            src-tauri/target/**/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  # ──────────────────────────────────────────────────
  # Job 2: Build Android APK
  # ──────────────────────────────────────────────────
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static files
        run: IS_CAPACITOR_BUILD=true npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK file
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/QC.Manager_${VERSION}.apk
          elif [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/QC.Manager_${VERSION}.apk
          else
            echo "Error: Release APK not found!"
            exit 1
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/QC.Manager_*.apk
          if-no-files-found: error

  # ──────────────────────────────────────────────────
  # Job 3: Combine releases, zip OTA assets, calculate SHA256, publish to Supabase
  # ──────────────────────────────────────────────────
  combine-release-json:
    needs: [build-tauri, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp_artifacts

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static files
        run: IS_CAPACITOR_BUILD=true npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Run release manifests, checksums, and OTA publisher script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-release-manifests.js
